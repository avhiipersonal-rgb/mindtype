<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MindType™ — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0806;--gold:#c9a84c;--gl:#e8c96a;
  --gdim:rgba(201,168,76,.1);--gbrd:rgba(201,168,76,.28);
  --s1:#131210;--s2:#1c1a17;--s3:#242118;
  --txt:#e8e0d0;--mid:#a89e91;--dim:#6b6358;--faint:#3a3630;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#c084fc;
  --fm:'DM Mono',monospace;--fb:'Bebas Neue',sans-serif;--fs:'Space Grotesk',sans-serif;
}
body{background:var(--ink);color:var(--txt);font-family:var(--fs);-webkit-font-smoothing:antialiased;min-height:100vh;font-size:15px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
.wrap{max-width:960px;margin:0 auto;padding:2rem 1.5rem;position:relative;z-index:1}

/* ── HEADER ── */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem}
.hdr-brand{font-family:var(--fb);font-size:2rem;letter-spacing:.12em;color:var(--gold);line-height:1}
.hdr-sub{font-family:var(--fm);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-top:.3rem}
.hdr-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.sync-info{font-family:var(--fm);font-size:11px;letter-spacing:.06em;color:var(--dim)}
.btn-sm{background:transparent;border:1px solid var(--faint);border-radius:3px;padding:.55rem 1rem;font-family:var(--fm);font-size:11px;letter-spacing:.1em;color:var(--mid);cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--gbrd);color:var(--gold)}
.btn-sm.danger:hover{border-color:rgba(248,113,113,.4);color:var(--red)}

/* ── LOGIN ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1.5rem}
.login-card{background:var(--s2);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:3rem 2.25rem;max-width:380px;width:100%;text-align:center}
.login-title{font-family:var(--fb);font-size:2.5rem;letter-spacing:.12em;color:var(--gold);margin-bottom:.25rem}
.login-sub{font-family:var(--fm);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:2.5rem;line-height:1.6}
.login-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:.9rem 1rem;color:var(--txt);font-family:var(--fs);font-size:.95rem;outline:none;margin-bottom:.85rem;transition:border-color .2s}
.login-input::placeholder{color:#3a3630}
.login-input:focus{border-color:var(--gbrd)}
.login-btn{width:100%;background:var(--gold);color:var(--ink);border:none;border-radius:3px;padding:.95rem;font-family:var(--fb);font-size:1.2rem;letter-spacing:.12em;cursor:pointer;transition:all .2s}
.login-btn:hover{background:var(--gl);transform:translateY(-1px)}
.login-err{font-family:var(--fm);font-size:11px;color:var(--red);margin-top:.6rem;letter-spacing:.06em}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-bottom:2.5rem}
.stat-card{background:var(--s2);border:1px solid rgba(255,255,255,.07);border-radius:4px;padding:1.25rem 1.35rem}
.stat-label{font-family:var(--fm);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:.5rem}
.stat-val{font-family:var(--fb);font-size:2.4rem;letter-spacing:.04em;line-height:1}
.stat-sub{font-family:var(--fm);font-size:11px;letter-spacing:.06em;color:var(--dim);margin-top:.3rem}

/* ── SECTION TITLE ── */
.sec-title{font-family:var(--fm);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:1.1rem;display:flex;align-items:center;gap:12px}
.sec-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.055)}

/* ── SALES CARDS ── */
.sales-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:2.5rem}
.sp-card{background:var(--s2);border:1px solid rgba(255,255,255,.07);border-radius:4px;padding:1.4rem 1.35rem}
.sp-card.top-card{border-color:var(--gbrd);background:rgba(201,168,76,.04)}
.sp-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.25rem}
.sp-name{font-size:1.05rem;font-weight:600;color:#fff}
.sp-handle{font-family:var(--fm);font-size:11px;letter-spacing:.07em;color:var(--dim);margin-bottom:1.1rem}
.sp-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.1rem}
.sp-metric{text-align:center}
.sp-metric-val{font-family:var(--fb);font-size:1.6rem;letter-spacing:.04em;line-height:1}
.sp-metric-lbl{font-family:var(--fm);font-size:10px;letter-spacing:.07em;color:var(--dim);margin-top:.2rem}
.sp-bar-track{height:3px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;margin-bottom:.9rem}
.sp-bar-fill{height:100%;border-radius:999px;background:var(--gold);transition:width .7s cubic-bezier(.22,1,.36,1)}
.sp-link-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:3px;padding:.6rem .85rem}
.sp-link-text{font-family:var(--fm);font-size:10.5px;letter-spacing:.05em;color:var(--mid);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:2px;padding:.3rem .65rem;font-family:var(--fm);font-size:10px;letter-spacing:.08em;color:var(--mid);cursor:pointer;flex-shrink:0;transition:all .2s}
.copy-btn:hover{border-color:var(--gbrd);color:var(--gold)}
.top-badge{font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:2px;background:var(--gdim);color:var(--gold);border:1px solid var(--gbrd);margin-left:.5rem}
.remove-btn{background:transparent;border:none;color:#3a3630;cursor:pointer;font-size:.85rem;padding:.15rem .35rem;transition:color .2s;line-height:1}
.remove-btn:hover{color:var(--red)}

/* ── ADD FORM ── */
.add-form{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:2.5rem}
.add-input{flex:1;min-width:160px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:3px;padding:.78rem .95rem;color:var(--txt);font-family:var(--fs);font-size:.9rem;outline:none;transition:border-color .2s}
.add-input::placeholder{color:#3a3630}
.add-input:focus{border-color:var(--gbrd)}
.add-btn{background:var(--gold);color:var(--ink);border:none;border-radius:3px;padding:.78rem 1.5rem;font-family:var(--fb);font-size:1rem;letter-spacing:.1em;cursor:pointer;flex-shrink:0;transition:all .2s;white-space:nowrap}
.add-btn:hover{background:var(--gl)}

/* ── FILTERS ── */
.filter-row{display:flex;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-btn{background:transparent;border:1px solid rgba(255,255,255,.08);border-radius:3px;padding:.48rem .9rem;font-family:var(--fm);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{border-color:var(--gbrd);color:var(--gold);background:var(--gdim)}
.filter-count{font-family:var(--fm);font-size:12px;color:var(--dim);margin-left:auto}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;margin-bottom:2.5rem;border-radius:4px;border:1px solid rgba(255,255,255,.06)}
table{width:100%;border-collapse:collapse;font-size:.875rem}
thead tr{border-bottom:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02)}
th{font-family:var(--fm);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);padding:.9rem 1rem;text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody tr:last-child{border-bottom:none}
td{padding:.85rem 1rem;color:var(--mid);font-size:.875rem}
.td-name{color:var(--txt)!important;font-weight:600}
.td-id{font-family:var(--fm);font-size:11px;letter-spacing:.05em;color:var(--dim)!important}
.ref-pill{font-family:var(--fm);font-size:10px;letter-spacing:.07em;padding:3px 9px;border-radius:2px;background:rgba(201,168,76,.09);color:var(--gold);border:1px solid var(--gbrd);display:inline-block;white-space:nowrap}
.ref-pill.direct{background:rgba(255,255,255,.04);color:var(--dim);border-color:rgba(255,255,255,.08)}
.td-amt{color:var(--green)!important;font-family:var(--fb);font-size:1.05rem;letter-spacing:.04em}
.td-ts{font-family:var(--fm);font-size:11px;letter-spacing:.05em;white-space:nowrap}
.td-pid{font-family:var(--fm);font-size:10px;letter-spacing:.04em;color:var(--faint)!important;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── EMPTY / LOADING ── */
.empty-state{text-align:center;padding:3.5rem 1rem;color:var(--dim);font-family:var(--fm);font-size:11px;letter-spacing:.12em;text-transform:uppercase;line-height:2.2}
.loading-bar{display:flex;align-items:center;justify-content:center;padding:2.5rem;font-family:var(--fm);font-size:11px;letter-spacing:.12em;color:var(--dim)}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.75rem;right:1.75rem;background:var(--s3);border:1px solid var(--gbrd);border-radius:4px;padding:.85rem 1.4rem;font-family:var(--fm);font-size:11px;letter-spacing:.1em;color:var(--gold);z-index:9999;animation:toastIn .3s ease both;pointer-events:none;max-width:280px}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── STATUS INDICATOR ── */
.status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.6);display:inline-block;margin-right:6px;animation:pulse 2s ease-in-out infinite}
.status-dot.offline{background:var(--red);box-shadow:0 0 6px rgba(248,113,113,.6)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

@media(max-width:600px){
  .stats-row{grid-template-columns:1fr 1fr}
  .sales-grid{grid-template-columns:1fr}
  .add-form{flex-direction:column}
  .add-btn{width:100%}
  .hdr{flex-direction:column;gap:.75rem}
  .sp-metrics{gap:6px}
  .sp-metric-val{font-size:1.35rem}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ══════════════════════════════════════════════════════════
   ▼▼▼  CONFIGURATION — EDIT THIS ONE LINE ONLY  ▼▼▼
══════════════════════════════════════════════════════════ */

// Same URL you use in index.html — your Google Apps Script Web App URL
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwD3vn3JhIT_9DTFPU0s1Z-Ma1xxHcPoIb_YgX-8zApPd_wJy_wujCQJh-cr7upug/exec';

/* ══════════════════════════════════════════════════════════
   ▲▲▲  END CONFIG
══════════════════════════════════════════════════════════ */

/* ── LOCAL STORAGE HELPERS ── */
const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch(e){return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};

/* ── STATE ── */
let S = {
  loggedIn: LS.get('mt_auth',false),
  password: LS.get('mt_pw',''),
  salespeople: LS.get('mt_sp',[
    {id:'sales1', name:'Salesperson 1', handle:'@sp1'},
    {id:'sales2', name:'Salesperson 2', handle:'@sp2'}
  ]),
  conversions: [],
  loading: false,
  filter: 'all',
  toast: null,
  newName: '',
  newHandle: '',
  lastSync: null,
  backendLive: null,
};

function set(patch){ S={...S,...patch}; render(); }

/* ══════════════════════════════════════════════
   DATA LAYER — GOOGLE SHEETS
   ─────────────────────────────────────────────
   This is the ONLY section that was changed from
   the original. All UI/CSS/render code is identical.

   Google Sheet column order expected:
   ref | event | name | identity | ts | payment_id
══════════════════════════════════════════════ */
async function fetchConversions() {
  if(!S.password) return;
  set({loading:true});

  try {
    // GET request to the Apps Script — it reads the sheet and returns JSON
    // We pass the dashboard password as a query param so the script can
    // optionally validate it server-side (optional but recommended).
    const url = `${SHEET_URL}?action=read&password=${encodeURIComponent(S.password)}`;
    const res = await fetch(url);

    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.json();

    // The Apps Script returns an array of row objects.
    // We only want rows where event === "payment".
    const payments = raw.filter(row => row.event === 'payment');

    const mapped = payments.map(row => ({
      name:       row.name       || '—',
      identity:   row.identity   || '—',
      ref:        row.ref        || 'direct',
      payment_id: row.payment_id || 'upi_manual',
      ts:         row.ts ? Number(row.ts) : Date.now(),
      timestamp:  row.ts ? new Date(Number(row.ts)).toISOString() : new Date().toISOString(),
    }));

    // Cache in localStorage as offline backup
    LS.set('mt_convs', mapped);

    set({
      conversions: mapped,
      loading: false,
      backendLive: true,
      lastSync: new Date()
    });

  } catch(e) {
    console.warn('Google Sheets fetch failed, falling back to localStorage:', e);
    // Fall back to localStorage cache — same data, just offline
    const local = LS.get('mt_convs', []);
    set({
      conversions: local,
      loading: false,
      backendLive: false,
      lastSync: new Date()
    });
  }
}

/* ══════════════════════════════════════════════
   HELPERS — IDENTICAL TO ORIGINAL
══════════════════════════════════════════════ */
function getSiteBase(){ return window.location.origin + '/'; }
function affLink(id){ return `${getSiteBase()}?ref=${id}`; }
function fmtDate(ts){
  if(!ts) return '—';
  const d = new Date(typeof ts==='string'?ts:ts);
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}) + ' ' +
         d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}
function convsByRef(id){ return S.conversions.filter(c=>(c.ref||'direct')===id); }
function convsDirect(){ return S.conversions.filter(c=>!c.ref||c.ref==='direct'); }
function spName(refId){ if(!refId||refId==='direct')return 'Direct';const sp=S.salespeople.find(s=>s.id===refId);return sp?sp.name:refId; }
function showToast(msg){ set({toast:msg}); setTimeout(()=>set({toast:null}),2500); }
function copyText(text, label='Copied!'){ navigator.clipboard.writeText(text).then(()=>showToast(label)).catch(()=>showToast('Copy: '+text.slice(0,50))); }

/* ══════════════════════════════════════════════
   ACTIONS — IDENTICAL TO ORIGINAL
══════════════════════════════════════════════ */
function doLogin(){
  const pw = document.getElementById('pw-input').value;
  if(!pw){ document.getElementById('pw-err').textContent='Enter password.'; return; }
  LS.set('mt_auth',true); LS.set('mt_pw',pw);
  set({loggedIn:true, password:pw});
  fetchConversions();
}

function doLogout(){
  LS.set('mt_auth',false); LS.set('mt_pw','');
  set({loggedIn:false, password:'', conversions:[]});
}

function doRefresh(){ fetchConversions(); showToast('Refreshing…'); }

function doAddSP(){
  const name = S.newName.trim();
  if(!name){ showToast('Enter a name first'); return; }
  const id = 'sp_' + Date.now();
  const handle = S.newHandle.trim() || ('@'+name.toLowerCase().replace(/\s+/g,''));
  const updated = [...S.salespeople, {id,name,handle}];
  LS.set('mt_sp',updated);
  set({salespeople:updated, newName:'', newHandle:''});
  showToast('Salesperson added!');
}

function doRemoveSP(id){
  if(!confirm('Remove this salesperson?')) return;
  const updated = S.salespeople.filter(s=>s.id!==id);
  LS.set('mt_sp',updated);
  set({salespeople:updated});
  showToast('Removed.');
}

function doClearData(){
  if(!confirm('Clear cached local conversion data?\n\nNote: Sheet data is not affected.')) return;
  LS.set('mt_convs',[]);
  set({conversions:[]});
  showToast('Local cache cleared.');
}

function doSeedDemo(){
  if(!confirm('Add demo conversion data for testing?')) return;
  const ids=['deep_thinker','creative_delayer','deadline_warrior','pattern_analyzer','controlled_chaos','lastminute','momentum_worker','strategic_mind'];
  const names=['Priya S.','Rahul M.','Anjali K.','Dev P.','Shreya R.','Arjun T.','Meera B.','Karan L.','Nisha V.','Aditya R.'];
  const refs=[...(S.salespeople.map(s=>s.id)),'direct','direct','direct'];
  const demo = Array.from({length:20},(_,i)=>({
    payment_id:'pay_demo_'+(i+Date.now()),
    ref:refs[i%refs.length],
    identity:ids[i%ids.length],
    name:names[i%names.length],
    event:'payment',
    amount:49,currency:'INR',
    ts: Date.now() - (i * 3.6e6 * (1+Math.random())),
    timestamp: new Date(Date.now() - i * 3.6e6 * (1+Math.random())).toISOString()
  }));
  const merged = [...S.conversions, ...demo];
  LS.set('mt_convs', demo);
  set({conversions:merged});
  showToast('20 demo records added!');
}

/* ══════════════════════════════════════════════
   RENDER — IDENTICAL TO ORIGINAL
══════════════════════════════════════════════ */
function render(){
  document.getElementById('app').innerHTML = S.loggedIn ? renderDash() : renderLogin();
}

function renderLogin(){
  return `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title">MINDTYPE™</div>
      <div class="login-sub">Affiliate Dashboard<br>Enter your dashboard password</div>
      <input class="login-input" id="pw-input" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="login-btn" onclick="doLogin()">Access Dashboard →</button>
      <div class="login-err" id="pw-err"></div>
    </div>
  </div>`;
}

function renderDash(){
  const convs = S.conversions;
  const total = convs.length;
  const totalRev = total * 49;
  const today = new Date(); today.setHours(0,0,0,0);
  const todayCount = convs.filter(c=>new Date(c.ts||c.timestamp)>=today).length;
  const directCount = convsDirect().length;

  const spStats = S.salespeople.map(sp => {
    const c = convsByRef(sp.id);
    return {...sp, count:c.length, rev:c.length*49, pct:total>0?Math.round(c.length/total*100):0};
  }).sort((a,b)=>b.count-a.count);
  const maxCount = Math.max(1,...spStats.map(s=>s.count));

  const filtered = S.filter==='all'
    ? [...convs]
    : S.filter==='direct'
    ? convs.filter(c=>!c.ref||c.ref==='direct')
    : convs.filter(c=>c.ref===S.filter);
  filtered.sort((a,b)=>(b.ts||new Date(b.timestamp).getTime()||0)-(a.ts||new Date(a.timestamp).getTime()||0));

  const syncStr = S.lastSync
    ? `Last sync: ${S.lastSync.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`
    : 'Not synced yet';

  return `
  <div class="wrap">
    <div class="hdr">
      <div>
        <div class="hdr-brand">MindType™</div>
        <div class="hdr-sub">
          <span class="status-dot${S.backendLive===false?' offline':''}"></span>
          ${S.backendLive===false?'Sheets offline — showing cache':S.backendLive===true?'Google Sheets connected':'Connecting…'}
          &nbsp;·&nbsp; ${syncStr}
        </div>
      </div>
      <div class="hdr-right">
        <button class="btn-sm" onclick="doRefresh()">↻ Refresh</button>
        <button class="btn-sm" onclick="doLogout()">Logout</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Sales</div>
        <div class="stat-val" style="color:var(--purple)">${total}</div>
        <div class="stat-sub">${todayCount} today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-val" style="color:var(--gold)">₹${totalRev.toLocaleString('en-IN')}</div>
        <div class="stat-sub">@ ₹49 per cert</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Via Affiliates</div>
        <div class="stat-val" style="color:var(--blue)">${total-directCount}</div>
        <div class="stat-sub">${total>0?Math.round((total-directCount)/total*100):0}% of total</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Direct / Organic</div>
        <div class="stat-val" style="color:var(--green)">${directCount}</div>
        <div class="stat-sub">${total>0?Math.round(directCount/total*100):0}% of total</div>
      </div>
    </div>

    <div class="sec-title">Salesperson Performance</div>
    <div class="sales-grid">
      ${spStats.map((sp,idx)=>`
      <div class="sp-card${idx===0&&sp.count>0?' top-card':''}">
        <div class="sp-hdr">
          <div>
            <span class="sp-name">${sp.name}</span>
            ${idx===0&&sp.count>0?'<span class="top-badge">Top</span>':''}
          </div>
          <button class="remove-btn" onclick="doRemoveSP('${sp.id}')" title="Remove">✕</button>
        </div>
        <div class="sp-handle">${sp.handle} &nbsp;·&nbsp; <code style="font-family:var(--fm);font-size:10px;color:var(--dim)">ref=${sp.id}</code></div>
        <div class="sp-metrics">
          <div class="sp-metric">
            <div class="sp-metric-val" style="color:var(--gold)">${sp.count}</div>
            <div class="sp-metric-lbl">Sales</div>
          </div>
          <div class="sp-metric">
            <div class="sp-metric-val" style="color:var(--green)">₹${sp.rev.toLocaleString('en-IN')}</div>
            <div class="sp-metric-lbl">Revenue</div>
          </div>
          <div class="sp-metric">
            <div class="sp-metric-val" style="color:var(--purple)">${sp.pct}%</div>
            <div class="sp-metric-lbl">Share</div>
          </div>
        </div>
        <div class="sp-bar-track">
          <div class="sp-bar-fill" style="width:${Math.round(sp.count/maxCount*100)}%"></div>
        </div>
        <div class="sp-link-row">
          <span class="sp-link-text">${affLink(sp.id)}</span>
          <button class="copy-btn" onclick="copyText('${affLink(sp.id)}','Link copied!')">Copy</button>
        </div>
      </div>`).join('')}
    </div>

    <div class="sec-title">Add Salesperson</div>
    <div class="add-form">
      <input class="add-input" id="sp-name" type="text" placeholder="Full name  (e.g. Rahul Sharma)"
        value="${S.newName}" oninput="S.newName=this.value"/>
      <input class="add-input" id="sp-handle" type="text" placeholder="Handle  (e.g. @rahul)"
        value="${S.newHandle}" oninput="S.newHandle=this.value"/>
      <button class="add-btn" onclick="doAddSP()">+ Add</button>
    </div>

    <div class="sec-title">Conversion Log</div>
    <div class="filter-row">
      ${['all','direct',...S.salespeople.map(s=>s.id)].map(f=>`
        <button class="filter-btn${S.filter===f?' active':''}" onclick="set({filter:'${f}'})">
          ${f==='all'?'All':f==='direct'?'Direct':spName(f)}
        </button>`).join('')}
      <span class="filter-count">${filtered.length} record${filtered.length!==1?'s':''}</span>
    </div>

    ${S.loading ? `<div class="loading-bar">Loading from Google Sheets…</div>` :
    filtered.length > 0 ? `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Name</th>
          <th>Identity</th>
          <th>Source / Ref</th>
          <th>Amount</th>
          <th>Date & Time</th>
          <th>Payment ID</th>
        </tr></thead>
        <tbody>
          ${filtered.map(c=>{
            const ref = c.ref || 'direct';
            const isDirect = !c.ref || c.ref === 'direct';
            const ts = c.ts || (c.timestamp ? new Date(c.timestamp).getTime() : 0);
            const pid = c.payment_id || '—';
            return `<tr>
              <td class="td-name">${c.name||'—'}</td>
              <td class="td-id">${(c.identity||'—').replace(/_/g,' ')}</td>
              <td>
                <span class="ref-pill${isDirect?' direct':''}">${isDirect?'direct':ref}</span>
                ${!isDirect?`<span style="font-family:var(--fm);font-size:10px;color:var(--dim);margin-left:6px">${spName(ref)}</span>`:''}
              </td>
              <td class="td-amt">₹49</td>
              <td class="td-ts">${fmtDate(ts)}</td>
              <td class="td-pid" title="${pid}">${pid.slice(0,22)}${pid.length>22?'…':''}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : `
    <div class="empty-state">
      No conversions yet.<br>
      Share affiliate links above to start tracking.<br><br>
      <button onclick="doSeedDemo()" class="btn-sm">Load demo data</button>
    </div>`}

    <div style="display:flex;gap:.75rem;justify-content:flex-end;flex-wrap:wrap;margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.05)">
      <button class="btn-sm" onclick="doSeedDemo()">Load demo data</button>
      <button class="btn-sm danger" onclick="doClearData()">Clear local cache</button>
    </div>
  </div>

  ${S.toast?`<div class="toast">${S.toast}</div>`:''}`;
}

/* ── INIT ── */
render();
if(S.loggedIn && S.password) fetchConversions();
</script>
</body>
</html>
