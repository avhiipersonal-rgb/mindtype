<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>MindType™ — Discover Your Identity</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
:root{
  --ink:#0a0806;--paper:#f5f0e8;
  --gold:#c9a84c;--gl:#e8c96a;
  --gdim:rgba(201,168,76,.1);--gbrd:rgba(201,168,76,.25);
  --fd:'Cormorant Garamond',serif;
  --fm:'DM Mono',monospace;--fb:'Bebas Neue',sans-serif;--fs:'Space Grotesk',sans-serif;
  --px:1.1rem;--r:3px;
}
body{background:var(--ink);font-family:var(--fs);color:#f5f0e8;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden;font-size:15px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
#root{position:relative;z-index:1}

.shell{width:100%;max-width:480px;margin:0 auto;padding-left:var(--px);padding-right:var(--px)}
.page{min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3.5rem 0 3rem}

/* LANDING */
.eyebrow{font-family:var(--fm);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:1.75rem;display:flex;align-items:center;gap:10px}
.eyebrow::before,.eyebrow::after{content:'';flex:1;height:1px;background:var(--gbrd)}
.land-hl{font-family:var(--fd);font-size:clamp(2.3rem,7vw,3.9rem);font-weight:300;line-height:1.1;letter-spacing:-.01em;color:#fff;text-align:center;margin-bottom:1.2rem}
.land-hl em{font-style:italic;color:var(--gl)}
.land-sub{font-size:.875rem;color:#7a7268;line-height:1.82;text-align:center;margin:0 auto 1rem;max-width:320px}
.land-sub strong{color:#c8c0b4;font-weight:500}
.land-official{font-family:var(--fm);font-size:9.5px;letter-spacing:.1em;color:#5a5248;text-align:center;margin-bottom:.6rem}
.land-official span{color:var(--gold)}
.sp-bar{display:flex;align-items:center;justify-content:center;gap:7px;font-family:var(--fm);font-size:9px;letter-spacing:.07em;color:#4a4540;margin-bottom:2.1rem;flex-wrap:wrap;text-align:center}
.sp-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.55;flex-shrink:0}
.cta-wrap{display:flex;flex-direction:column;align-items:center;gap:.65rem;width:100%}
.btn-primary{background:var(--gold);color:var(--ink);border:none;border-radius:var(--r);font-family:var(--fb);font-size:1.1rem;letter-spacing:.12em;padding:.95rem 2rem;cursor:pointer;width:100%;max-width:340px;transition:background .2s,transform .15s,box-shadow .2s;position:relative;overflow:hidden;display:block}
.btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.2) 50%,transparent 65%);background-size:250% auto;animation:shim 3s linear infinite}
.btn-primary:hover{background:var(--gl);transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,.28)}
.cta-note{font-family:var(--fm);font-size:9px;letter-spacing:.07em;color:#3d3730;text-align:center}
.trust-strip{display:flex;gap:.9rem;justify-content:center;flex-wrap:wrap;margin-top:1.4rem}
.trust-item{font-size:11px;color:#5a5248;display:flex;align-items:center;gap:5px;font-family:var(--fm);letter-spacing:.04em}
.trust-item::before{content:'·';color:var(--gold);font-size:1rem;line-height:1}
.live-badge{display:inline-flex;align-items:center;gap:7px;margin-top:1.1rem;font-family:var(--fm);font-size:9.5px;letter-spacing:.06em;color:#5a5248;justify-content:center}
.live-dot{width:5px;height:5px;border-radius:50%;background:#e05454;box-shadow:0 0 6px rgba(224,84,84,.7);animation:pulse 1.8s ease-in-out infinite;flex-shrink:0}
.live-count{color:var(--gold);font-family:var(--fb);font-size:.9rem;letter-spacing:.06em}

/* QUIZ */
.quiz-wrap{width:100%;padding:2.25rem 0}
.prog-row{display:flex;justify-content:space-between;margin-bottom:7px}
.prog-row span{font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase}
.prog-s{color:#5a5248}.prog-p{color:var(--gold)}
.prog-track{height:1px;background:rgba(255,255,255,.07);position:relative}
.prog-fill{position:absolute;top:0;left:0;height:100%;background:var(--gold);transition:width .5s cubic-bezier(.22,1,.36,1);box-shadow:0 0 10px rgba(201,168,76,.4)}
.q-frame{animation:fadeSlide .35s cubic-bezier(.22,1,.36,1) both}
.q-tag{font-family:var(--fm);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;display:inline-flex;align-items:center;gap:8px}
.q-tag::before{content:'';width:16px;height:1px;background:var(--gbrd)}
.q-text{font-family:var(--fd);font-size:clamp(1.15rem,3.8vw,1.55rem);font-weight:400;line-height:1.38;color:#fff;margin-bottom:1.6rem;letter-spacing:-.005em}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);padding:.82rem .95rem;cursor:pointer;display:flex;align-items:flex-start;gap:10px;text-align:left;width:100%;transition:background .18s,border-color .18s,transform .18s}
.opt:hover:not(.sel){background:rgba(201,168,76,.06);border-color:rgba(201,168,76,.22);transform:translateX(3px)}
.opt.sel{background:rgba(201,168,76,.09);border-color:var(--gold)}
.opt-key{font-family:var(--fm);font-size:9px;letter-spacing:.1em;color:#5a5248;padding-top:2px;flex-shrink:0;transition:color .18s}
.opt.sel .opt-key{color:var(--gold)}
.opt-body{font-size:.85rem;color:#7a7268;line-height:1.48;transition:color .18s}
.opt.sel .opt-body{color:#ddd8ce}
.nav-row{display:flex;gap:9px;margin-top:1.6rem}
.btn-back{background:transparent;border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:.72rem .9rem;color:#3d3730;font-family:var(--fm);font-size:9px;letter-spacing:.1em;cursor:pointer;flex-shrink:0;transition:all .2s}
.btn-back:hover{border-color:rgba(255,255,255,.18);color:#6b6358}
.btn-next{flex:1;background:var(--gold);color:var(--ink);border:none;border-radius:var(--r);font-family:var(--fb);font-size:.95rem;letter-spacing:.12em;padding:.82rem 1.25rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.btn-next::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.18) 50%,transparent 65%);background-size:250% auto;animation:shim 2.5s linear infinite}
.btn-next:not(.on){opacity:.2;pointer-events:none}
.btn-next.on:hover{background:var(--gl);transform:translateY(-1px)}

/* REVEAL */
.reveal-screen{position:fixed;inset:0;z-index:1000;background:var(--ink);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.25rem;padding:1.5rem;animation:revealFadeOut 1s 2.5s cubic-bezier(.22,1,.36,1) both}
.reveal-word{font-family:var(--fb);font-size:clamp(2.4rem,9vw,6rem);letter-spacing:.08em;color:transparent;background:linear-gradient(135deg,var(--gold) 0%,var(--gl) 50%,var(--gold) 100%);-webkit-background-clip:text;background-clip:text;animation:wordPulse 2.5s cubic-bezier(.22,1,.36,1) both;text-align:center}
.reveal-sub{font-family:var(--fm);font-size:9.5px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;opacity:0;animation:fadein .4s .8s both}

/* RESULT */
.result-page{padding:1.5rem 0 3.5rem}
.disc-top{text-align:center;padding:2rem 0 1.5rem}
.disc-label{font-family:var(--fm);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
.disc-name{font-family:var(--fd);font-size:clamp(1.85rem,6.5vw,3.4rem);font-weight:300;line-height:1.1;color:#fff;letter-spacing:-.015em;margin-bottom:.35rem}
.disc-name em{font-style:italic;color:var(--gl)}
.disc-sub{font-family:var(--fm);font-size:9px;letter-spacing:.16em;color:#5a5248;text-transform:uppercase;margin-bottom:1.2rem}
.disc-hook{font-family:var(--fd);font-style:italic;font-size:1.02rem;font-weight:300;color:#7a7268;max-width:340px;margin:0 auto;line-height:1.65}
.ornament{display:flex;align-items:center;gap:12px;margin:1.35rem 0;font-family:var(--fm);font-size:9px;letter-spacing:.2em;color:#2a2520;text-transform:uppercase}
.ornament::before,.ornament::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.055)}
.scores-section{margin-bottom:1.5rem}
.scores-label{font-family:var(--fm);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#5a5248;margin-bottom:.85rem}
.score-rows{display:flex;flex-direction:column;gap:12px}
.score-row{display:flex;align-items:center;gap:10px}
.score-row-lbl{font-family:var(--fm);font-size:8.5px;letter-spacing:.04em;color:#5a5248;width:90px;min-width:90px;flex-shrink:0;line-height:1.35}
.score-bar-wrap{flex:1;height:1.5px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;min-width:0}
.score-bar-fill{height:100%;border-radius:999px;transition:width 1s 1s cubic-bezier(.22,1,.36,1)}
.score-row-val{font-family:var(--fb);font-size:.95rem;letter-spacing:.05em;width:32px;text-align:right;flex-shrink:0}
.rarity-block{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1rem;background:var(--gdim);border:1px solid var(--gbrd);border-radius:var(--r);margin-bottom:1.5rem;gap:.5rem}
.rarity-eyebrow{font-family:var(--fm);font-size:8.5px;letter-spacing:.12em;color:#5a5248;text-transform:uppercase;margin-bottom:.2rem}
.rarity-val{font-family:var(--fb);font-size:1.3rem;letter-spacing:.06em}
.id-desc-block{border-top:1px solid rgba(255,255,255,.055);border-bottom:1px solid rgba(255,255,255,.055);padding:1.5rem 0;margin-bottom:1.5rem}
.id-desc-para{font-family:var(--fd);font-size:1rem;font-weight:300;line-height:1.82;color:#7a7268;margin-bottom:.85rem}
.id-desc-para:last-child{margin-bottom:0}
.id-desc-para strong{color:#c8c0b4;font-weight:400}
.level-insight{margin-top:1rem;padding:.85rem 1rem;border-radius:var(--r)}
.li-label{font-family:var(--fm);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.3rem}
.li-text{font-family:var(--fd);font-size:.95rem;font-weight:300;line-height:1.65;color:#c8c0b4}

/* CERT SECTION */
.cert-section{margin-top:.5rem}
.cert-head{font-family:var(--fd);font-size:1.45rem;font-weight:300;font-style:italic;color:#fff;text-align:center;margin-bottom:.25rem}
.cert-sub{font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#5a5248;text-align:center;margin-bottom:1.4rem}
.name-label{font-family:var(--fm);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#7a7268;margin-bottom:.5rem;display:block;width:100%}
.name-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:.82rem .95rem;color:#e8e0d0;font-size:.9rem;font-family:var(--fs);outline:none;margin-bottom:.95rem;transition:border-color .2s,background .2s;-webkit-appearance:none}
.name-input::placeholder{color:#2a2520}
.name-input:focus{border-color:var(--gbrd);background:rgba(201,168,76,.04)}
.name-input.err{border-color:rgba(220,80,80,.4)}

/* CERT CARD */
.cert-wrap{position:relative;margin-bottom:1.2rem;border-radius:4px;overflow:hidden;box-shadow:0 4px 50px rgba(0,0,0,.55)}
.cert-lock-overlay{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.65rem;background:rgba(10,8,6,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.cert-lock-overlay.gone{display:none}
.cert-lock-icon{font-size:1.75rem}
.cert-lock-txt{font-family:var(--fm);font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);text-align:center;line-height:1.65;white-space:pre-line}
.cert-wm-name{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-22deg);font-family:var(--fb);font-size:clamp(1.8rem,6vw,2.8rem);letter-spacing:.2em;color:rgba(201,168,76,.15);white-space:nowrap;pointer-events:none;z-index:5;user-select:none;-webkit-user-select:none}
.cert-card{background:var(--paper);position:relative}
.cert-inner{padding:1.35rem 1.25rem}
@media(min-width:400px){.cert-inner{padding:1.7rem 1.55rem}}
.cert-bg-wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;font-family:var(--fb);font-size:5rem;letter-spacing:.3em;color:rgba(0,0,0,.022);transform:rotate(-30deg);white-space:nowrap;overflow:hidden;user-select:none}
.cert-toprow{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem;border-bottom:1px solid rgba(0,0,0,.08);padding-bottom:.75rem}
.cert-brand{font-family:var(--fb);font-size:.75rem;letter-spacing:.2em;color:rgba(0,0,0,.3);text-transform:uppercase}
.cert-seal{width:27px;height:27px;border-radius:50%;border:1.5px solid rgba(201,168,76,.5);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gold)}
.cert-for{font-family:var(--fm);font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(0,0,0,.35);margin-bottom:.2rem}
.cert-nm{font-family:var(--fd);font-size:clamp(1.2rem,4vw,1.75rem);font-weight:600;color:#1a1612;margin-bottom:.4rem;letter-spacing:-.02em;line-height:1.08;min-height:1.7rem}
.cert-tag{display:inline-block;font-family:var(--fm);font-size:7px;letter-spacing:.11em;text-transform:uppercase;padding:3px 9px;border-radius:2px;margin-bottom:.7rem;border:1px solid}
.cert-ml{font-family:var(--fm);font-size:7.5px;letter-spacing:.14em;color:rgba(0,0,0,.35);text-transform:uppercase;margin-bottom:.2rem}
.cert-lvl-row{display:flex;align-items:baseline;gap:.25rem;margin-bottom:.15rem;flex-wrap:wrap}
.cert-lvl-n{font-family:var(--fb);font-size:2.5rem;letter-spacing:.04em;line-height:1}
.cert-lvl-max{font-family:var(--fd);font-size:.85rem;font-weight:300;font-style:italic;color:rgba(0,0,0,.35);align-self:flex-end;padding-bottom:.12rem}
.cert-lvl-ttl{font-family:var(--fd);font-size:.83rem;font-style:italic;color:rgba(0,0,0,.4);margin-bottom:.7rem}
.cert-bar-t{height:2px;border-radius:999px;background:rgba(0,0,0,.08);margin-bottom:.9rem;overflow:hidden}
.cert-bar-f{height:100%;border-radius:999px}
.cert-para{font-family:var(--fd);font-size:.84rem;color:rgba(0,0,0,.42);line-height:1.65;margin-bottom:.95rem}
.cert-foot{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(0,0,0,.08);padding-top:.72rem;flex-wrap:wrap;gap:.4rem}
.cert-date,.cert-verify{font-family:var(--fm);font-size:7px;color:rgba(0,0,0,.28);letter-spacing:.07em}

/* PRICE */
.price-block{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.7rem;padding:.85rem .95rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);gap:.75rem}
.price-what{font-family:var(--fm);font-size:8.5px;letter-spacing:.07em;color:#7a7268;line-height:1.85}
.price-what span{display:block}
.price-nums{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:1px}
.price-was{text-decoration:line-through;color:#3d3730;font-family:var(--fm);font-size:.75rem}
.price-now{font-family:var(--fb);font-size:1.6rem;letter-spacing:.04em;line-height:1.05}
.price-curr{font-family:var(--fm);font-size:.65rem;color:#5a5248}
.urgency-strip{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:.7rem;font-family:var(--fm);font-size:8.5px;letter-spacing:.07em;color:#cc5555;text-align:center}
.urgency-dot{width:5px;height:5px;border-radius:50%;background:#e05454;box-shadow:0 0 6px rgba(224,84,84,.6);animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}
.pay-note{font-family:var(--fm);font-size:8.5px;color:#7a7268;text-align:center;margin-bottom:.6rem;letter-spacing:.06em;line-height:1.6}

/* SHARE (post-pay) */
.share-section{margin-top:1.25rem}
.share-lbl{font-family:var(--fm);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#5a5248;text-align:center;margin-bottom:.85rem}
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.5rem}
.btn-share{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:.75rem .5rem;font-family:var(--fm);font-size:8.5px;letter-spacing:.06em;color:#5a5248;cursor:pointer;text-align:center;transition:all .2s;line-height:1.35}
.btn-share:hover{background:rgba(201,168,76,.07);border-color:var(--gbrd);color:var(--gold)}
.s-wa{border-color:rgba(37,211,102,.15);color:#20953a}.s-wa:hover{background:rgba(37,211,102,.06);border-color:rgba(37,211,102,.3);color:#25d366}
.s-tg{border-color:rgba(0,136,204,.15);color:#0077b3}.s-tg:hover{background:rgba(0,136,204,.06);border-color:rgba(0,136,204,.3);color:#0088cc}
.s-ig{border-color:rgba(225,48,108,.15);color:#b02058}.s-ig:hover{background:rgba(225,48,108,.06);border-color:rgba(225,48,108,.3);color:#e1306c}
.s-snap{border-color:rgba(255,252,0,.12);color:#8a8700}.s-snap:hover{background:rgba(255,252,0,.04);border-color:rgba(255,252,0,.25);color:#c9c200}
.s-tw{border-color:rgba(29,161,242,.15);color:#0d7ab8}.s-tw:hover{background:rgba(29,161,242,.06);border-color:rgba(29,161,242,.3);color:#1da1f2}
.s-li{border-color:rgba(10,102,194,.15);color:#0a5e9a}.s-li:hover{background:rgba(10,102,194,.06);border-color:rgba(10,102,194,.3);color:#0a66c2}
.bottom-proof{margin-top:1rem;text-align:center;font-family:var(--fm);font-size:9px;letter-spacing:.1em;color:#3d3730}
.bottom-proof span{color:var(--gold);font-family:var(--fb);font-size:.9rem;letter-spacing:.06em}
.retake-btn{width:100%;margin-top:2rem;background:transparent;border:1px solid rgba(255,255,255,.06);border-radius:var(--r);padding:.8rem;color:#3d3730;font-family:var(--fm);font-size:9px;letter-spacing:.1em;cursor:pointer;transition:all .2s}
.retake-btn:hover{border-color:rgba(255,255,255,.14);color:#5a5248}

@keyframes shim{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes wordPulse{0%{opacity:0;transform:scale(.88) translateY(18px)}20%{opacity:1;transform:scale(1.03) translateY(0)}80%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.06)}}
@keyframes revealFadeOut{from{opacity:1}to{opacity:0;pointer-events:none}}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.s1{animation:su .5s .08s both cubic-bezier(.22,1,.36,1)}
.s2{animation:su .5s .16s both cubic-bezier(.22,1,.36,1)}
.s3{animation:su .5s .24s both cubic-bezier(.22,1,.36,1)}
.s4{animation:su .5s .32s both cubic-bezier(.22,1,.36,1)}
.s5{animation:su .5s .4s both cubic-bezier(.22,1,.36,1)}
.s6{animation:su .5s .48s both cubic-bezier(.22,1,.36,1)}

@media(max-width:400px){
  :root{--px:.95rem}
  .land-hl{font-size:2rem}
  .disc-name{font-size:1.7rem}

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function buildSession(){
  const ot=shuffle(QS.filter(q=>q.type==="ot")).slice(0,2);
  const pc=shuffle(QS.filter(q=>q.type==="pc")).slice(0,2);
  const hy=shuffle(QS.filter(q=>q.type==="hybrid")).slice(0,1);
  return shuffle([...ot,...pc,...hy]);
}
function toLvl(s){return Math.min(9,Math.round((s/15)*9))}
function getLB(l){return l>=7?"high":l>=4?"mid":"low"}
function pickId(ot,pc){
  const ol=toLvl(ot),pl=toLvl(pc),T=5;
  if(ol>=T&&pl>=T){
    const pool=Object.values(IDS).filter(i=>i.type==="both");
    return{id:pool[Math.min(Math.floor(((ol+pl)/18)*pool.length),pool.length-1)],otLvl:ol,pcLvl:pl};
  }
  if(ol>=pl){
    const pool=Object.values(IDS).filter(i=>i.type==="ot");
    return{id:pool[Math.min(Math.floor((ol/9)*(pool.length-1)),pool.length-1)],otLvl:ol,pcLvl:pl};
  }
  const pool=Object.values(IDS).filter(i=>i.type==="pc");
  return{id:pool[Math.min(Math.floor((pl/9)*(pool.length-1)),pool.length-1)],otLvl:ol,pcLvl:pl};
}
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const getToday=()=>new Date().toLocaleDateString("en-IN",{year:"numeric",month:"long",day:"numeric"});

══════════════════════════════════════════════ */

      React.createElement("div",{className:"eyebrow s1"},"Behavioural Identity System"),
      React.createElement("h1",{className:"land-hl s2"},
        "Stop Calling It",React.createElement("br",null),
        "A ",React.createElement("em",null,"Flaw"),". It's Your",React.createElement("br",null),"Identity."
      ),
      React.createElement("p",{className:"land-sub s3"},
        "Five questions. Calibrated scoring.",React.createElement("br",null),
        React.createElement("strong",null,"Discover who you actually are"),
        " — and why it's not the problem you think it is."
      ),
      React.createElement("div",{className:"land-official s3"},"Make it official. ",React.createElement("span",null,"Save it. Share it.")),
      React.createElement("div",{className:"sp-bar s3"},
        "Already being shared on",
        React.createElement("span",{className:"sp-dot"}),
        React.createElement("span",null,"Instagram"),
        React.createElement("span",{className:"sp-dot"}),
        React.createElement("span",null,"LinkedIn"),
        React.createElement("span",{className:"sp-dot"}),
        React.createElement("span",null,"WhatsApp")
      ),
      React.createElement("div",{className:"cta-wrap s4"},
        React.createElement("button",{className:"btn-primary",onClick:onStart},"Begin Your Discovery →"),
        React.createElement("div",{className:"cta-note"},"Free to take · Results in 60 seconds · ₹49 to make it official")
      ),
      React.createElement("div",{className:"trust-strip s5"},
        ["Behaviourally grounded","No account needed","Free to take"].map(t=>
          React.createElement("span",{key:t,className:"trust-item"},t)
        )
      ),
      React.createElement("div",{className:"live-badge s6"},
        React.createElement("span",{className:"live-dot"}),
        React.createElement("span",{className:"live-count"},social),
        React.createElement("span",null," identities discovered today")
      )
    )
  );
}

/* ══════════════════════════════════════════════
   QUIZ
══════════════════════════════════════════════ */
function Quiz({questions,current,selected,onSelect,onNext,onBack}){
  const q=questions[current];
  const pct=Math.round(((current+1)/questions.length)*100);
  const KEYS=["A","B","C","D"];
  const tl=q.type==="ot"?"Awareness":q.type==="pc"?"Execution":"Behaviour";
  return React.createElement("div",{className:"page",style:{justifyContent:"flex-start",paddingTop:"2.5rem"}},
    React.createElement("div",{className:"shell",style:{width:"100%"}},
      React.createElement("div",{className:"quiz-wrap"},
        React.createElement("div",{style:{marginBottom:"2rem"}},
          React.createElement("div",{className:"prog-row"},
            React.createElement("span",{className:"prog-s"},`${current+1} / ${questions.length}`),
            React.createElement("span",{className:"prog-p"},`${pct}%`)
          ),
          React.createElement("div",{className:"prog-track"},
            React.createElement("div",{className:"prog-fill",style:{width:`${pct}%`}})
          )
        ),
        React.createElement("div",{className:"q-frame",key:current},
          React.createElement("div",{className:"q-tag"},tl),
          React.createElement("div",{className:"q-text"},q.text),
          React.createElement("div",{className:"opts"},
            q.opts.map((opt,i)=>
              React.createElement("button",{
                key:i,
                className:`opt${selected&&selected.t===opt.t?" sel":""}`,
                onClick:()=>onSelect(opt)
              },
                React.createElement("span",{className:"opt-key"},KEYS[i]),
                React.createElement("span",{className:"opt-body"},opt.t)
              )
            )
          ),
          React.createElement("div",{className:"nav-row"},
            current>0
              ? React.createElement("button",{className:"btn-back",onClick:onBack},"← Back")
              : React.createElement("div",null),
            React.createElement("button",{
              className:`btn-next${selected?" on":""}`,
              onClick:onNext
            }, current===questions.length-1 ? "Reveal My Identity" : "Continue →")
          )
        )
      )
    )
  );
}

/* ══════════════════════════════════════════════
   REVEAL
══════════════════════════════════════════════ */
function Reveal({identity}){
  return React.createElement("div",{className:"reveal-screen"},
    React.createElement("div",{className:"reveal-word"},identity.title),
    React.createElement("div",{className:"reveal-sub"},"Your identity has been determined")
  );
}

/* ══════════════════════════════════════════════
   RESULT
══════════════════════════════════════════════ */
function Result({id,otLvl,pcLvl,rarity,social,name,setName,nameErr,onPay,payState,onRetake}){
  const lvl=id.type==="both"?Math.max(otLvl,pcLvl):id.type==="ot"?otLvl:pcLvl;
  const bucket=getLB(lvl);
  const paid=payState==="done";
  const otPct=Math.round((otLvl/9)*100);
  const pcPct=Math.round((pcLvl/9)*100);

  const sText=encodeURIComponent(`🧠 I just discovered my Mind Identity!\n\nI'm *${id.title}*\n\n"${id.hook}"\n\nFind yours → mindtype.co`);
  const sUrl=encodeURIComponent('https://mindtype.co');
  const shareMap={
    wa:`https://wa.me/?text=${sText}`,
    tg:`https://t.me/share/url?url=${sUrl}&text=${sText}`,
    tw:`https://twitter.com/intent/tweet?text=${sText}`,
    ig:'https://www.instagram.com/',
    snap:'https://www.snapchat.com/',
    li:`https://www.linkedin.com/sharing/share-offsite/?url=${sUrl}`
  };
  const sh=(k)=>window.open(shareMap[k],'_blank');

  return React.createElement("div",{className:"shell result-page"},

    /* Discovery header */
    React.createElement("div",{className:"disc-top s1"},
      React.createElement("div",{className:"disc-label"},"Identity Determined"),
      React.createElement("h1",{className:"disc-name"},React.createElement("em",null,id.emoji+" "),id.title),
      React.createElement("div",{className:"disc-sub"},id.subtitle),
      React.createElement("div",{className:"disc-hook"},`"${id.hook}"`)
    ),

    React.createElement("div",{className:"ornament s2"},"·  ·  ·"),

    /* Scores */
    React.createElement("div",{className:"scores-section s3"},
      React.createElement("div",{className:"scores-label"},"Your Indices"),
      React.createElement("div",{className:"score-rows"},
        [{label:"Overthinking",lvl:otLvl,pct:otPct},{label:"Procrastination",lvl:pcLvl,pct:pcPct}].map(sc=>
          React.createElement("div",{key:sc.label,className:"score-row"},
            React.createElement("div",{className:"score-row-lbl"},sc.label),
            React.createElement("div",{className:"score-bar-wrap"},
              React.createElement("div",{className:"score-bar-fill",style:{width:`${sc.pct}%`,background:id.accent}})
            ),
            React.createElement("div",{className:"score-row-val",style:{color:id.accent}},`${sc.lvl}/9`)
          )
        )
      )
    ),

    /* Rarity */
    React.createElement("div",{className:"rarity-block s4"},
      React.createElement("div",null,
        React.createElement("div",{className:"rarity-eyebrow"},"Identity Rarity"),
        React.createElement("div",{className:"rarity-val",style:{color:id.accent}},`Top ${rarity}%`)
      ),
      React.createElement("div",{style:{fontSize:"1.35rem"}},rarity<=15?"🔥":rarity<=25?"⚡":"✨")
    ),

    /* Description */
    React.createElement("div",{className:"id-desc-block s5"},
      id.paras.map((p,i)=>
        React.createElement("p",{key:i,className:"id-desc-para"},
          i===0 ? React.createElement(React.Fragment,null,React.createElement("strong",null,p)) : p
        )
      ),
      React.createElement("div",{
        className:"level-insight",
        style:{background:id.accentDim,border:`1px solid ${id.accentBorder}`}
      },
        React.createElement("div",{className:"li-label",style:{color:id.accent}},"Your Level"),
        React.createElement("div",{className:"li-text"},id.levels[bucket])
      )
    ),

    /* Certificate section */
    React.createElement("div",{className:"cert-section s6"},
      React.createElement("h2",{className:"cert-head"},"Make it official."),
      React.createElement("p",{className:"cert-sub"},"Your certified identity document"),

      React.createElement("label",{className:"name-label"},"Your name for the certificate"),
      React.createElement("input",{
        className:`name-input${nameErr?" err":""}`,
        type:"text",placeholder:"Enter your full name…",maxLength:28,
        value:name,onChange:e=>setName(e.target.value),autoComplete:"off"
      }),

      React.createElement(CertCard,{id,name,otLvl,pcLvl,locked:!paid}),

      /* Pricing */
      React.createElement("div",{className:"price-block"},
        React.createElement("div",{className:"price-what"},
          React.createElement("span",null,"Certificate PDF · 2 pages"),
          React.createElement("span",null,"All social platforms"),
          React.createElement("span",null,"Instant download · Verified")
        ),
        React.createElement("div",{className:"price-nums"},
          React.createElement("span",{className:"price-was"},"₹99"),
          React.createElement("span",{className:"price-now",style:{color:id.accent}},"₹49"),
          React.createElement("span",{className:"price-curr"},"today only")
        )
      ),

      React.createElement("div",{className:"urgency-strip"},
        React.createElement("span",{className:"urgency-dot"}),
        "Limited certificates remaining today"
      ),

      /* Pay button */
      paid
        ? React.createElement("button",{
            className:"btn-primary",
            style:{maxWidth:"100%",borderRadius:"3px",marginBottom:".5rem",background:"#16a34a",cursor:"default"}
          },"✓ Payment Received — Share Below")
        : React.createElement("button",{
            className:"btn-primary",
            style:{maxWidth:"100%",borderRadius:"3px",marginBottom:".5rem",opacity:payState==="loading"?.65:1},
            onClick:()=>onPay()
          }, payState==="loading" ? "⏳ Opening payment…" : "Pay ₹49 via UPI →"),

      React.createElement("p",{className:"pay-note"},
        paid
          ? "Payment confirmed. Your identity is officially certified."
          : "Tap the button → complete UPI payment → tap 'I've Paid' below"
      ),

      /* After UPI opens, show confirmation button */
      !paid && payState==="waiting" &&
        React.createElement("button",{
          className:"btn-primary",
          style:{maxWidth:"100%",borderRadius:"3px",marginBottom:".5rem",
                 background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.15)",
                 color:"#c8c0b4",marginTop:".5rem"},
          onClick:()=>onPay('confirm')
        },"✓ I've Paid — Unlock My Certificate"),

      React.createElement("p",{style:{textAlign:"center",fontFamily:"'DM Mono',monospace",fontSize:"8.5px",letterSpacing:".09em",color:"#3d3730",marginBottom:"1rem"}},"Personalised · PDF · Shareable · Instant"),

      /* Post-pay share */
      paid && React.createElement("div",{className:"share-section"},
        React.createElement("div",{className:"share-lbl"},"Share your identity"),
        React.createElement("div",{className:"share-grid"},
          [{k:"wa",l:"WhatsApp 💬",c:"s-wa"},{k:"tg",l:"Telegram ✈️",c:"s-tg"},
           {k:"ig",l:"Instagram 📸",c:"s-ig"},{k:"snap",l:"Snapchat 👻",c:"s-snap"},
           {k:"tw",l:"Twitter 🐦",c:"s-tw"},{k:"li",l:"LinkedIn 💼",c:"s-li"}]
          .map(s=>React.createElement("button",{key:s.k,className:`btn-share ${s.c}`,onClick:()=>sh(s.k)},s.l))
        ),
        React.createElement("div",{className:"bottom-proof"},
          React.createElement("span",null,social)," people received their certificate today"
        )
      )
    ),

    React.createElement("button",{className:"retake-btn",onClick:onRetake},"↺  Retake the Assessment")
  );
}

/* ══════════════════════════════════════════════
   APP
══════════════════════════════════════════════ */
function App(){
  const [phase,setPhase]=useState("landing");
  const [questions,setQuestions]=useState([]);
  const [current,setCurrent]=useState(0);
  const [selected,setSelected]=useState(null);
  const [prevA,setPrevA]=useState([]);
  const [otScore,setOtScore]=useState(0);
  const [pcScore,setPcScore]=useState(0);
  const [identity,setIdentity]=useState(null);
  const [otLvl,setOtLvl]=useState(0);
  const [pcLvl,setPcLvl]=useState(0);
  const [rarity]=useState(()=>rnd(10,35));
  const [social]=useState(()=>rnd(30,70));
  const [name,setName]=useState("");
  const [nameErr,setNameErr]=useState(false);
  const [payState,setPayState]=useState("idle"); // idle | waiting | done
  const [showReveal,setShowReveal]=useState(false);
  const top=()=>window.scrollTo({top:0,behavior:"smooth"});

  function startQuiz(){
    setQuestions(buildSession());setCurrent(0);setSelected(null);
    setPrevA([]);setOtScore(0);setPcScore(0);setPhase("quiz");top();
  }

  function handleNext(){
    if(!selected)return;
    const q=questions[current];
    const aOt=q.type==="ot"||q.type==="hybrid"?selected.s:0;
    const aPc=q.type==="pc"||q.type==="hybrid"?selected.s:0;
    const nOt=otScore+aOt,nPc=pcScore+aPc;
    setPrevA([...prevA,{opt:selected,aOt,aPc}]);setOtScore(nOt);setPcScore(nPc);
    if(current<questions.length-1){setCurrent(current+1);setSelected(null);}
    else{
      const res=pickId(nOt,nPc);setIdentity(res.id);setOtLvl(res.otLvl);setPcLvl(res.pcLvl);
      setShowReveal(true);
      setTimeout(()=>{setShowReveal(false);setPhase("result");top();},3200);
    }
  }

  function handleBack(){
    if(current===0)return;
    const pa=[...prevA];const last=pa.pop();setPrevA(pa);
    setOtScore(otScore-last.aOt);setPcScore(pcScore-last.aPc);
    setCurrent(current-1);setSelected(null);
  }

  function handlePay(action){
    if(action==='confirm'){
      // User says they've paid — trust them + unlock + track
      setPayState("done");
      track('payment',{name,identity:identity.title,ref:_ref});
      return;
    }
    if(!name.trim()){setNameErr(true);setTimeout(()=>setNameErr(false),2500);return;}
    // Open UPI link and move to waiting state
    setPayState("waiting");
    // Build deep-link with prefilled name in the note
    const upiWithNote = UPI_LINK + `&tn=MindType+${encodeURIComponent(name)}`;
    window.location.href = upiWithNote;
    // Track that pay button was tapped (before UPI redirect)
    track('pay_tap',{name,identity:identity.title});
  }

  function handleRetake(){setPhase("landing");setName("");setPayState("idle");top();}

  return React.createElement("div",null,
    showReveal&&identity&&React.createElement(Reveal,{identity}),
    phase==="landing"&&React.createElement(Landing,{onStart:startQuiz,social}),
    phase==="quiz"&&React.createElement(Quiz,{questions,current,selected,onSelect:setSelected,onNext:handleNext,onBack:handleBack}),
    phase==="result"&&identity&&React.createElement(Result,{
      id:identity,otLvl,pcLvl,rarity,social,
      name,setName,nameErr,
      onPay:handlePay,payState,onRetake:handleRetake
    })
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
